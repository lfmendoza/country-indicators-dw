services:
  postgres:
    image: postgres:16-alpine
    container_name: country-indicators-dw-postgres
    environment:
      POSTGRES_USER: ci_dw
      POSTGRES_PASSWORD: change_me_ci_dw
      POSTGRES_DB: country_indicators_dw
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci_dw -d country_indicators_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8.2
    container_name: country-indicators-dw-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
